<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Toll System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; color: white !important; }
        .nav-link { color: rgba(255,255,255,0.85) !important; }
        .nav-link:hover { color: white !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .card-header { border-radius: 15px 15px 0 0 !important; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-primary:hover { opacity: 0.9; }
        .stat-card { border-radius: 15px; padding: 1.5rem; color: white; }
        .stat-card.purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #1a1a1a; }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .badge-success-custom { background: #d4edda; color: #155724; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-danger-custom { background: #f8d7da; color: #721c24; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .sidebar { min-height: calc(100vh - 56px); background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar .nav-link { color: #555; padding: 12px 20px; border-radius: 10px; margin: 3px 10px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #f0eeff; color: #667eea; }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; }
        .main-content { padding: 2rem; }
        .page-title { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 1.5rem; }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-shield-check"></i> Smart Toll System
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white" id="nav-user-name"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3" id="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/vehicles">
                        <i class="bi bi-car-front"></i> My Vehicles
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/wallet">
                        <i class="bi bi-wallet2"></i> Wallet
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/toll">
                        <i class="bi bi-sign-turn-right"></i> Pay Toll
                    </a>
                </li>
            </ul>
        </div>
        <div class="col-md-10 main-content" id="main-content">
            <!-- Page content goes here -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:8080';

    function getToken() {
        return localStorage.getItem('token');
    }

    function getUser() {
        return JSON.parse(localStorage.getItem('user') || '{}');
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login';
    }

    function authHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
        };
    }

    async function apiGet(url) {
        const res = await fetch(API + url, { headers: authHeaders() });
        if (res.status === 403) { logout(); return null; }
        return res.json();
    }

    async function apiPost(url, body) {
        const res = await fetch(API + url, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(body)
        });
        return res.json();
    }

    window.onload = function() {
        if (!getToken() && !window.location.href.includes('login') && !window.location.href.includes('register')) {
            window.location.href = '/login';
        }
        const user = getUser();
        if (user.name) {
            document.getElementById('nav-user-name').textContent = 'Hi, ' + user.name;
        }
        const path = window.location.pathname;
        document.querySelectorAll('.sidebar .nav-link').forEach(link => {
            if (link.getAttribute('href') === path) {
                link.classList.add('active');
            }
        });
    }
</script>
</body>
</html>
