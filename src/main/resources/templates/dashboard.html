<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Toll System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .navbar-brand, .nav-link, #nav-user-name { color: white !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .stat-card { border-radius: 15px; padding: 1.5rem; color: white; }
        .stat-card.purple { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card.green { background: linear-gradient(135deg, #11998e, #38ef7d); color: #1a1a1a; }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .sidebar { min-height: calc(100vh - 56px); background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar .nav-link { color: #555; padding: 12px 20px; border-radius: 10px; margin: 3px 10px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #f0eeff; color: #667eea; }
        .main-content { padding: 2rem; }
        .badge-success-custom { background: #d4edda; color: #155724; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-danger-custom { background: #f8d7da; color: #721c24; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-shield-check"></i> Smart Toll System</a>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" class="text-white"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link active" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" href="/vehicles"><i class="bi bi-car-front me-2"></i>My Vehicles</a></li>
                <li><a class="nav-link" href="/wallet"><i class="bi bi-wallet2 me-2"></i>Wallet</a></li>
                <li><a class="nav-link" href="/toll"><i class="bi bi-sign-turn-right me-2"></i>Pay Toll</a></li>
                <li><a class="nav-link" href="/admin" style="color:#e74c3c">
                    <i class="bi bi-shield-fill me-2"></i>Admin Panel
                </a></li>
            </ul>
        </div>
        <div class="col-md-10 main-content">
            <h4 class="fw-bold mb-4">Dashboard</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card purple">
                        <div class="small mb-1 opacity-75"><i class="bi bi-wallet2"></i> Wallet Balance</div>
                        <div class="fs-2 fw-bold" id="balance">₹0.00</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card green">
                        <div class="small mb-1 opacity-75"><i class="bi bi-car-front"></i> Registered Vehicles</div>
                        <div class="fs-2 fw-bold" id="vehicle-count">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card orange">
                        <div class="small mb-1 opacity-75"><i class="bi bi-receipt"></i> Total Transactions</div>
                        <div class="fs-2 fw-bold" id="txn-count">0</div>
                    </div>
                </div>
            </div>
            <div class="card p-3">
                <h6 class="fw-bold mb-3"><i class="bi bi-clock-history"></i> Recent Transactions</h6>
                <table class="table table-hover" id="txn-table">
                    <thead class="table-light">
                    <tr><th>Date</th><th>Vehicle</th><th>Booth</th><th>Amount</th><th>Status</th></tr>
                    </thead>
                    <tbody id="txn-body">
                    <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    const API = 'http://localhost:8080';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login';
    document.getElementById('nav-user-name').textContent = 'Hi, ' + (user.name || '');
    function logout() { localStorage.clear(); window.location.href = '/login'; }
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    async function loadDashboard() {
        const wallet = await fetch(API + '/api/wallet', { headers: authHeaders() }).then(r => r.json());
        document.getElementById('balance').textContent = '₹' + (wallet.balance || 0).toFixed(2);
        const vehicles = await fetch(API + '/api/vehicles', { headers: authHeaders() }).then(r => r.json());
        document.getElementById('vehicle-count').textContent = vehicles.length || 0;
        const txns = await fetch(API + '/api/toll/transactions', { headers: authHeaders() }).then(r => r.json());
        document.getElementById('txn-count').textContent = txns.length || 0;
        const tbody = document.getElementById('txn-body');
        if (!txns.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No transactions yet</td></tr>'; return; }
        tbody.innerHTML = txns.slice(0,10).map(t => `
            <tr>
                <td>${new Date(t.createdAt).toLocaleDateString('en-IN')}</td>
                <td>${t.vehicle?.regNumber || '-'}</td>
                <td>${t.tollBooth?.name || '-'}</td>
                <td>₹${t.amount}</td>
                <td><span class="${t.status === 'SUCCESS' ? 'badge-success-custom' : 'badge-danger-custom'}">${t.status}</span></td>
            </tr>`).join('');
    }
    loadDashboard();
</script>
</body>
</html>
