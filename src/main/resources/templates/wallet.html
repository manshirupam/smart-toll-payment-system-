<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wallet - Smart Toll System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .navbar-brand { color: white !important; font-weight: 700; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .sidebar { min-height: calc(100vh - 56px); background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar .nav-link { color: #555; padding: 12px 20px; border-radius: 10px; margin: 3px 10px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #f0eeff; color: #667eea; }
        .main-content { padding: 2rem; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .wallet-card { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; padding: 2rem; color: white; }
        .quick-btn { border: 2px solid #667eea; color: #667eea; border-radius: 10px; padding: 8px 20px; background: white; cursor: pointer; transition: all 0.2s; }
        .quick-btn:hover { background: #667eea; color: white; }
        .badge-success-custom { background: #d4edda; color: #155724; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-danger-custom { background: #f8d7da; color: #721c24; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-shield-check"></i> Smart Toll System</a>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" class="text-white"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" href="/vehicles"><i class="bi bi-car-front me-2"></i>My Vehicles</a></li>
                <li><a class="nav-link active" href="/wallet"><i class="bi bi-wallet2 me-2"></i>Wallet</a></li>
                <li><a class="nav-link" href="/toll"><i class="bi bi-sign-turn-right me-2"></i>Pay Toll</a></li>
                <li><a class="nav-link" href="/admin" style="color:#e74c3c">
                    <i class="bi bi-shield-fill me-2"></i>Admin Panel
                </a></li>
            </ul>
        </div>
        <div class="col-md-10 main-content">
            <h4 class="fw-bold mb-4">My Wallet</h4>
            <div id="alert-box"></div>
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="wallet-card mb-3">
                        <div class="small opacity-75 mb-1"><i class="bi bi-wallet2"></i> Available Balance</div>
                        <div class="display-5 fw-bold" id="balance">₹0.00</div>
                        <div class="small opacity-75 mt-2" id="wallet-updated"></div>
                    </div>
                    <div class="card p-3">
                        <h6 class="fw-bold mb-3">Recharge Wallet</h6>
                        <div class="d-flex gap-2 flex-wrap mb-3">
                            <button class="quick-btn" onclick="setAmount(100)">₹100</button>
                            <button class="quick-btn" onclick="setAmount(200)">₹200</button>
                            <button class="quick-btn" onclick="setAmount(500)">₹500</button>
                            <button class="quick-btn" onclick="setAmount(1000)">₹1000</button>
                        </div>
                        <input type="number" class="form-control mb-3" id="recharge-amount" placeholder="Or enter custom amount">
                        <button class="btn btn-primary w-100" onclick="recharge()">
                            <i class="bi bi-plus-circle"></i> Recharge Now
                        </button>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card p-3">
                        <h6 class="fw-bold mb-3"><i class="bi bi-clock-history"></i> Transaction History</h6>
                        <table class="table table-hover">
                            <thead class="table-light">
                            <tr><th>Date</th><th>Booth</th><th>Amount</th><th>Status</th></tr>
                            </thead>
                            <tbody id="txn-body">
                            <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:8080';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login';
    document.getElementById('nav-user-name').textContent = 'Hi, ' + (user.name || '');
    function logout() { localStorage.clear(); window.location.href = '/login'; }
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    function setAmount(val) { document.getElementById('recharge-amount').value = val; }

    async function loadWallet() {
        const wallet = await fetch(API + '/api/wallet', { headers: authHeaders() }).then(r => r.json());
        document.getElementById('balance').textContent = '₹' + wallet.balance.toFixed(2);
        document.getElementById('wallet-updated').textContent = 'Last updated: ' + new Date(wallet.updatedAt).toLocaleString('en-IN');
        const txns = await fetch(API + '/api/toll/transactions', { headers: authHeaders() }).then(r => r.json());
        const tbody = document.getElementById('txn-body');
        if (!txns.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No transactions yet</td></tr>'; return; }
        tbody.innerHTML = txns.map(t => `
            <tr>
                <td>${new Date(t.createdAt).toLocaleDateString('en-IN')}</td>
                <td>${t.tollBooth?.name || '-'}</td>
                <td>₹${t.amount}</td>
                <td><span class="${t.status === 'SUCCESS' ? 'badge-success-custom' : 'badge-danger-custom'}">${t.status}</span></td>
            </tr>`).join('');
    }

    async function recharge() {
        const amount = parseFloat(document.getElementById('recharge-amount').value);
        if (!amount || amount < 1) {
            document.getElementById('alert-box').innerHTML = '<div class="alert alert-warning">Please enter a valid amount!</div>';
            return;
        }
        const res = await fetch(API + '/api/wallet/recharge', {
            method: 'POST', headers: authHeaders(), body: JSON.stringify({ amount })
        });
        const data = await res.json();
        document.getElementById('alert-box').innerHTML = '<div class="alert alert-success">₹' + amount + ' recharged successfully!</div>';
        setTimeout(() => document.getElementById('alert-box').innerHTML = '', 3000);
        loadWallet();
    }
    loadWallet();
</script>
</body>
</html>
