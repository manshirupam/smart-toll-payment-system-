# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_toll_db
spring.datasource.username=tolluser
spring.datasource.password=toll@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# App
spring.application.name=smart-toll-system
server.port=8080

# JWT
app.jwt.secret=SmartTollSecretKey2024SuperLongSecureKey
app.jwt.expiration=86400000

# Thymeleaf
spring.thymeleaf.check-template-location=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true